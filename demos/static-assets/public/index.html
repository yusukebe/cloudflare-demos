<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>static-assets</title>
  </head>
  <body>
    <h1>Workers Static Assets</h1>
    <p>This page is served from <code>public/</code> without invoking the Worker.</p>
    <p id="result">calling /api/hello...</p>
    <script>
      fetch('/api/hello')
        .then((res) => res.json())
        .then((data) => {
          document.getElementById('result').textContent = data.message
        })
    </script>
  </body>
</html>
